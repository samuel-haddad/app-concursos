name: app_estudo_tcdf
description: App pessoal de controle de plano de estudo para o concurso do TCDF.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.5.6
  # Materiais: visualizador de PDF (Dart puro) + abrir áudio/vídeo no player nativo.
  syncfusion_flutter_pdfviewer: ">=26.0.0 <29.0.0"
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/data/
